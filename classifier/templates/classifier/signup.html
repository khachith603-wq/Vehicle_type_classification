{% extends 'classifier/base.html' %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem; font-family: 'Outfit'; text-align: center;">Join VehicleIQ</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">{{ field.help_text }}</small>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}
